<!DOCTYPE HTML>
<html>

<head>
    <meta charset="UTF-8">
    <title>Project Tori 🛶</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #00d2ff;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .grid-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-drive {
            background: linear-gradient(135deg, var(--accent), #3a7bd5);
            color: white;
        }

        .btn-reverse {
            background: linear-gradient(135deg, var(--warning), #d97706);
            color: white;
        }

        .btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .val-badge {
            background: var(--accent);
            color: #0f172a;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px var(--accent);
        }

        .stop-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #f87171, var(--danger));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
        }

        .angle-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-top: 10px;
        }

        .btn-mini {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PROJECT TORI 🛶</h1>
        <div class="grid-btns">
            <button class="btn btn-drive" onclick="setDirection('forward')">Forward</button>
            <button class="btn btn-reverse" onclick="setDirection('reverse')">Reverse</button>
        </div>
        <div class="panel">
            <div class="label-row"><span>Thruster Power</span><span class="val-badge" id="speedValue">0</span></div>
            <input type="range" min="0" max="255" value="0" id="speedSlider" oninput="updateSpeed(this.value)">
        </div>
        <div class="panel">
            <div class="label-row"><span>Front Fin</span><span class="val-badge" style="background:var(--warning)"
                    id="frontVal">97</span></div>
            <input type="range" min="0" max="180" value="97" id="frontSlider"
                oninput="updateServo('front', this.value)">
            <div class="angle-container">
                <button class="btn-mini" onclick="quickServo('front', 45)">45°</button>
                <button class="btn-mini" onclick="quickServo('front', 97)">Center</button>
                <button class="btn-mini" onclick="quickServo('front', 135)">135°</button>
            </div>
        </div>
        <div class="panel">
            <div class="label-row"><span>Back Fin</span><span class="val-badge" style="background:var(--warning)"
                    id="backVal">97</span></div>
            <input type="range" min="0" max="180" value="97" id="backSlider" oninput="updateServo('back', this.value)">
            <div class="angle-container">
                <button class="btn-mini" onclick="quickServo('back', 45)">45°</button>
                <button class="btn-mini" onclick="quickServo('back', 97)">Center</button>
                <button class="btn-mini" onclick="quickServo('back', 135)">135°</button>
            </div>
        </div>
        <button class="stop-btn" onclick="setDirection('stopped')">EMERGENCY STOP</button>
    </div>
    <script>
        function setDirection(dir) {
            fetch('/action?dir=' + dir);
            if (dir == "stopped") {
                document.getElementById('speedSlider').value = 0;
                document.getElementById('speedValue').innerText = "0";
                document.getElementById('frontSlider').value = 97;
                document.getElementById('frontVal').innerText = "97";
                document.getElementById('backSlider').value = 97;
                document.getElementById('backVal').innerText = "97";
            }
        }
        function updateSpeed(val) {
            document.getElementById('speedValue').innerText = val;
            fetch('/speed?val=' + val);
        }
        function updateServo(target, angle) {
            document.getElementById(target + 'Val').innerText = angle;
            fetch('/servo?target=' + target + '&val=' + angle);
        }
        function quickServo(target, angle) {
            document.getElementById(target + 'Val').innerText = angle;
            document.getElementById(target + 'Slider').value = angle;
            fetch('/servo?target=' + target + '&val=' + angle);
        }
    </script>
</body>

</html>
